<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Guati · Escanea el código QR</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde-oscuro:  #1E3A14;
      --verde-profundo:#152E0B;
      --verde-claro:   #4A7C35;
      --dorado:        #C9943A;
      --dorado-claro:  #E8C87A;
      --beige-suave:   #EDD9B0;
      --blanco:        #FFFFFF;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--verde-oscuro);
      color: var(--blanco);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 100;
    }

    /* ─── Page layout ─── */
    .scan-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.25rem, 4vw, 2rem);
      padding: clamp(1.5rem, 5vw, 2.5rem) 1.5rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    /* ─── Logo ─── */
    .scan-logo {
      height: clamp(36px, 8vw, 48px);
      filter: brightness(0) invert(1);
      opacity: 0.95;
    }

    /* ─── Title ─── */
    .scan-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.7rem, 6vw, 2.4rem);
      color: var(--blanco);
      line-height: 1.1;
    }

    /* ─── Viewfinder ─── */
    .scan-viewfinder {
      position: relative;
      width: min(82vw, 300px);
      height: min(82vw, 300px);
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 0 1px rgba(237,217,176,0.2), 0 24px 64px rgba(0,0,0,0.5);
    }

    /* Corner brackets */
    .scan-viewfinder::before,
    .scan-viewfinder::after {
      content: '';
      position: absolute;
      z-index: 10;
      width: 28px; height: 28px;
      pointer-events: none;
    }
    .scan-viewfinder::before {
      top: 10px; left: 10px;
      border-top: 3px solid var(--dorado);
      border-left: 3px solid var(--dorado);
      border-radius: 6px 0 0 0;
    }
    .scan-viewfinder::after {
      bottom: 10px; right: 10px;
      border-bottom: 3px solid var(--dorado);
      border-right: 3px solid var(--dorado);
      border-radius: 0 0 6px 0;
    }
    /* Other two corners via inner spans */
    .scan-corner-tr,
    .scan-corner-bl {
      position: absolute;
      z-index: 10;
      width: 28px; height: 28px;
      pointer-events: none;
    }
    .scan-corner-tr {
      top: 10px; right: 10px;
      border-top: 3px solid var(--dorado);
      border-right: 3px solid var(--dorado);
      border-radius: 0 6px 0 0;
    }
    .scan-corner-bl {
      bottom: 10px; left: 10px;
      border-bottom: 3px solid var(--dorado);
      border-left: 3px solid var(--dorado);
      border-radius: 0 0 0 6px;
    }

    /* Scan line */
    .scan-line {
      position: absolute;
      left: 10px; right: 10px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--dorado), transparent);
      z-index: 9;
      animation: scan-sweep 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--dorado);
    }
    @keyframes scan-sweep {
      0%   { top: 14px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 16px); opacity: 0; }
    }

    /* html5-qrcode internal elements */
    #qr-reader {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
    }
    #qr-reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      border-radius: 0 !important;
    }
    /* Hide the library's default UI chrome */
    #qr-reader img,
    #qr-reader__dashboard,
    #qr-reader__status_span,
    #qr-reader__header_message,
    #qr-reader__filescan_input {
      display: none !important;
    }

    /* ─── Hint text ─── */
    .scan-hint {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ─── Fallback (permission denied) ─── */
    .scan-fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: min(82vw, 300px);
    }
    .scan-fallback-msg {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.55;
    }
    .scan-fallback-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--dorado);
      color: var(--verde-profundo);
      border: none;
      border-radius: 50px;
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      min-height: 48px;
    }
    .scan-fallback-btn:hover { background: var(--dorado-claro); transform: translateY(-2px); }

    /* ─── Success overlay ─── */
    .scan-success {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--verde-profundo);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
    }
    .scan-success.is-active { display: flex; animation: fade-in 0.3s ease; }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .scan-success-check {
      width: 72px; height: 72px;
      background: var(--verde-claro);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .scan-success-check svg {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: draw-check 0.4s ease forwards 0.2s;
    }
    @keyframes draw-check { to { stroke-dashoffset: 0; } }
    .scan-success-label {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: var(--beige-suave);
    }
  </style>
</head>
<body>

  <div class="scan-page">

    <img src="assets/images/logo guati.png" alt="Guati" class="scan-logo">

    <h1 class="scan-title">Escanea el código QR</h1>

    <div class="scan-viewfinder" id="viewfinder">
      <span class="scan-corner-tr" aria-hidden="true"></span>
      <span class="scan-corner-bl" aria-hidden="true"></span>
      <div class="scan-line" aria-hidden="true"></div>
      <div id="qr-reader"></div>
    </div>

    <p class="scan-hint">Apunta la cámara al código</p>

    <div class="scan-fallback" id="scanFallback">
      <p class="scan-fallback-msg">No pudimos acceder a tu cámara.<br>Toca el botón para ir al sitio.</p>
      <button class="scan-fallback-btn" onclick="window.location.href='index.html'">Ir al sitio →</button>
    </div>

  </div>

  <!-- Success overlay -->
  <div class="scan-success" id="scanSuccess" aria-live="polite">
    <div class="scan-success-check">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="7,18 15,26 29,10"/>
      </svg>
    </div>
    <p class="scan-success-label">¡Listo!</p>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    (function () {
      const successOverlay = document.getElementById('scanSuccess');
      const fallback       = document.getElementById('scanFallback');
      const viewfinder     = document.getElementById('viewfinder');

      const scanner = new Html5Qrcode('qr-reader');

      const config = {
        fps: 15,
        qrbox: { width: 220, height: 220 },
        aspectRatio: 1.0,
        videoConstraints: { facingMode: 'environment' }
      };

      let handled = false;
      let readyAt = 0; // timestamp after which scans are accepted

      function onScanSuccess(decodedText) {
        if (handled) return;
        if (!decodedText || !decodedText.trim()) return;
        if (Date.now() < readyAt) return; // ignore false positives during warmup

        handled = true;
        scanner.stop().catch(() => {});
        successOverlay.classList.add('is-active');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 850);
      }

      scanner
        .start({ facingMode: 'environment' }, config, onScanSuccess)
        .then(() => {
          // Camera is live — accept scans after 1.5 s warmup
          readyAt = Date.now() + 1500;
        })
        .catch(() => {
          // Camera denied or unavailable — show fallback
          viewfinder.style.display = 'none';
          fallback.style.display   = 'flex';
        });
    })();
  </script>

</body>
</html>
